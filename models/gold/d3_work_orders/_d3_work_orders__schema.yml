version: 2

models:
  - name: fct_work_order
    description: "Neutral canonical work order abstraction above all four source systems (Jan-IT, ServiceChannel, UtilizeCore, Springshot). source_wo_id preserves the original system identifier for traceability — do not overwrite."
    columns:
      - name: canonical_id
        description: "Surrogate canonical key — generated in dbt using dbt_utils.generate_surrogate_key."
        tests:
          - not_null
          - unique
      - name: source_wo_id
        description: "Source system original identifier — PRESERVE, do not overwrite with canonical_id."
        tests:
          - not_null
      - name: source_system
        description: "Source system that originated this work order."
        tests:
          - not_null
          - accepted_values:
              values: ['janit', 'servicechannel', 'utilizecore', 'springshot']
      - name: client_canonical_id
        description: "FK to dim_client."
      - name: service_location_id
        description: "FK to dim_service_location."
      - name: contract_canonical_id
        description: "FK to fct_contract."
      - name: wo_number
        description: "Work order number."
      - name: wo_type
        description: "e.g. Routine Clean, Emergency, Inspection."
      - name: wo_description
        description: "Free-text description of the work order."
      - name: priority
        description: "Work order priority."
      - name: scheduled_start
        description: "Scheduled start timestamp."
      - name: scheduled_end
        description: "Scheduled end timestamp."
      - name: actual_start
        description: "Actual start timestamp."
      - name: actual_end
        description: "Actual end timestamp."
      - name: wo_status
        description: "Normalised work order status across all four source systems."
        tests:
          - not_null
          - accepted_values:
              values: ['OPEN', 'IN_PROGRESS', 'COMPLETED', 'CANCELLED', 'ON_HOLD']
      - name: source_status_raw
        description: "Original status code before normalisation."
      - name: sla_target_hours
        description: "SLA target completion hours."
      - name: sla_met
        description: "Whether the SLA target was met."
      - name: estimated_cost
        description: "Estimated cost of the work order."
      - name: actual_cost
        description: "Actual cost of the work order."
      - name: created_at
        description: "Record creation timestamp."
        tests:
          - not_null
      - name: updated_at
        description: "Record last-updated timestamp."
        tests:
          - not_null
      - name: dbt_loaded_at
        description: "Timestamp when dbt last wrote this row."
        tests:
          - not_null

  - name: fct_work_order_line
    description: "Line-level detail for canonical work orders. Captures per-service quantities and costs across all four work order source systems."
    columns:
      - name: canonical_id
        description: "Surrogate canonical key — generated in dbt using dbt_utils.generate_surrogate_key."
        tests:
          - not_null
          - unique
      - name: work_order_canonical_id
        description: "FK to fct_work_order."
        tests:
          - not_null
      - name: employee_canonical_id
        description: "FK to dim_employee (defined in D4)."
      - name: line_number
        description: "Line sequence number on the work order."
      - name: service_description
        description: "Description of the service on this line."
      - name: quantity
        description: "Quantity of service units."
      - name: unit_of_measure
        description: "Unit of measure for quantity."
      - name: unit_cost
        description: "Cost per unit."
      - name: line_cost
        description: "Total line cost (quantity × unit_cost)."
      - name: primary_source_system
        description: "Source system that is authoritative for this work order line record."
        tests:
          - not_null
          - accepted_values:
              values: ['netsuite', 'adp', 'janit', 'servicechannel', 'utilizecore', 'springshot']
      - name: primary_source_id
        description: "Source system PK value."
        tests:
          - not_null
      - name: dbt_loaded_at
        description: "Timestamp when dbt last wrote this row."
        tests:
          - not_null
