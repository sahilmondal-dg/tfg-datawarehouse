name: Bronze Ingestion

on:
  schedule:
    - cron: "0 6 * * *"    # daily at 6AM UTC — runs before business hours
  workflow_dispatch:         # manual trigger from GitHub UI (Actions tab → Run workflow)

defaults:
  run:
    working-directory: pipelines

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (includes state file)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      # -------------------------------------------------------------------
      # ADP API — currently hitting DummyJSON, no auth needed
      # Switch to real ADP: update ADP_BASE_URL secret + config/adp.yaml
      # -------------------------------------------------------------------
      - name: Run ADP API ingestion
        env:
          ADP_BASE_URL: ${{ secrets.ADP_BASE_URL }}
          ADP_TOKEN_URL: ${{ secrets.ADP_TOKEN_URL }}
          ADP_CLIENT_ID: ${{ secrets.ADP_CLIENT_ID }}
          ADP_CLIENT_SECRET: ${{ secrets.ADP_CLIENT_SECRET }}
          FABRIC_ACCOUNT_URL: ${{ secrets.FABRIC_ACCOUNT_URL }}
          FABRIC_FILE_SYSTEM: ${{ secrets.FABRIC_FILE_SYSTEM }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python ingest_adp_api.py
        continue-on-error: true

      # -------------------------------------------------------------------
      # ADP CSV — enable once SFTP credentials and file patterns confirmed
      # -------------------------------------------------------------------
      - name: Run ADP CSV ingestion
        env:
          ADP_SFTP_HOST: ${{ secrets.ADP_SFTP_HOST }}
          ADP_SFTP_USER: ${{ secrets.ADP_SFTP_USER }}
          ADP_SFTP_PASSWORD: ${{ secrets.ADP_SFTP_PASSWORD }}
          FABRIC_ACCOUNT_URL: ${{ secrets.FABRIC_ACCOUNT_URL }}
          FABRIC_FILE_SYSTEM: ${{ secrets.FABRIC_FILE_SYSTEM }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python ingest_adp_csv.py
        continue-on-error: true

      # -------------------------------------------------------------------
      # NetSuite — enable once JDBC driver and credentials arrive
      # -------------------------------------------------------------------
      - name: Run NetSuite ingestion
        env:
          NETSUITE_USER: ${{ secrets.NETSUITE_USER }}
          NETSUITE_PASSWORD: ${{ secrets.NETSUITE_PASSWORD }}
          FABRIC_ACCOUNT_URL: ${{ secrets.FABRIC_ACCOUNT_URL }}
          FABRIC_FILE_SYSTEM: ${{ secrets.FABRIC_FILE_SYSTEM }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python ingest_netsuite.py
        continue-on-error: true

      # -------------------------------------------------------------------
      # Jan-IT MySQL — enable once credentials arrive
      # Pass source name as arg so it reads config/janit.yaml
      # -------------------------------------------------------------------
      - name: Run Jan-IT MySQL ingestion
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          FABRIC_ACCOUNT_URL: ${{ secrets.FABRIC_ACCOUNT_URL }}
          FABRIC_FILE_SYSTEM: ${{ secrets.FABRIC_FILE_SYSTEM }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python ingest_mysql.py janit
        continue-on-error: true

      # -------------------------------------------------------------------
      # Commit updated state file back to repo so watermarks persist
      # [skip ci] prevents this commit from triggering another workflow run
      # -------------------------------------------------------------------
      - name: Commit updated pipeline state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/pipeline_state.json
          git diff --staged --quiet || git commit -m "chore: update pipeline state [skip ci]"
          git push
        working-directory: .
