name: Bronze Ingestion

on:
  schedule:
    - cron: "0 6 * * *"    # daily at 6AM UTC — runs before business hours
  workflow_dispatch:         # manual trigger from GitHub UI (Actions tab → Run workflow)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write            # allows the state commit step to push back to the repo

defaults:
  run:
    working-directory: pipelines

jobs:
  ingest:
    runs-on: self-hosted

    steps:
      - name: Checkout repo (includes state file)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC Driver 18 for SQL Server
        working-directory: .
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      # -------------------------------------------------------------------
      # ADP API — currently hitting DummyJSON, no auth needed
      # Switch to real ADP: update ADP_BASE_URL secret + config/adp.yaml
      # -------------------------------------------------------------------
      - name: Run ADP API ingestion
        env:
          ADP_BASE_URL: ${{ secrets.ADP_BASE_URL }}
          ADP_TOKEN_URL: ${{ secrets.ADP_TOKEN_URL }}
          ADP_CLIENT_ID: ${{ secrets.ADP_CLIENT_ID }}
          ADP_CLIENT_SECRET: ${{ secrets.ADP_CLIENT_SECRET }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          FABRIC_ACCOUNT_URL: ${{ secrets.FABRIC_ACCOUNT_URL }}
          FABRIC_FILE_SYSTEM: ${{ secrets.FABRIC_FILE_SYSTEM }}
          FABRIC_LAKEHOUSE_ID: ${{ secrets.FABRIC_LAKEHOUSE_ID }}
        run: python ingest_adp_api.py
        continue-on-error: true

      # -------------------------------------------------------------------
      # dbt — transforms bronze Delta tables into silver models
      # Connects to Fabric Warehouse (DDL-capable) and cross-queries the
      # Lakehouse (bronze) using Fabric's cross-database querying.
      #
      # Required secrets:
      #   FABRIC_SQL_ENDPOINT      — Warehouse SQL connection string
      #                              (from Warehouse → Settings → SQL connection)
      #   FABRIC_WAREHOUSE_DATABASE — Warehouse database name (display name
      #                               you gave the Warehouse, e.g. "silver_wh")
      # -------------------------------------------------------------------
      - name: Generate dbt profiles.yml
        working-directory: .
        env:
          FABRIC_SQL_ENDPOINT: ${{ secrets.FABRIC_SQL_ENDPOINT }}
          FABRIC_WAREHOUSE_DATABASE: ${{ secrets.FABRIC_WAREHOUSE_DATABASE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          tfg_datawarehouse:
            target: ci
            outputs:
              ci:
                type: fabric
                driver: "ODBC Driver 18 for SQL Server"
                server: $FABRIC_SQL_ENDPOINT
                port: 1433
                database: $FABRIC_WAREHOUSE_DATABASE
                schema: dbt
                authentication: ServicePrincipal
                client_id: "$AZURE_CLIENT_ID"
                client_secret: "$AZURE_CLIENT_SECRET"
                tenant_id: "$AZURE_TENANT_ID"
                encrypt: true
                trust_cert: false
          EOF

      - name: Run dbt silver models
        working-directory: .
        env:
          # DBT_DATABASE is the Lakehouse name — used by source() refs in
          # _adp__sources.yml. Fabric Warehouse cross-queries it by name.
          DBT_DATABASE: bronze
        run: dbt run --select silver.adp --profiles-dir ~/.dbt
        continue-on-error: true

      # -------------------------------------------------------------------
      # Commit updated state file back to repo so watermarks persist
      # [skip ci] prevents this commit from triggering another workflow run
      # -------------------------------------------------------------------
      - name: Commit updated pipeline state
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipelines/state/pipeline_state.json
          git diff --staged --quiet || git commit -m "chore: update pipeline state [skip ci]"
          git push
